name: Scheduled Python Task

on:
  # 1. 定时触发：使用 cron 表达式
  schedule:
    - cron: '0 * * * *'  # 一个小时一次 执行
  # 2. 支持手动触发（强烈推荐，方便测试和紧急执行）
  workflow_dispatch:       

jobs:
  run-and-commit:
    runs-on: ubuntu-latest
    permissions:  # 关键配置：显式声明写入权限
      contents: write

    steps:
      # 步骤 1：拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤 2：配置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 步骤 3：安装依赖
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 步骤 4：运行你的 Python 脚本
      - name: Run Python script
        run: python your_script.py

      # 步骤 5：自动提交代码
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          # 只有当有文件变更时才执行 commit 和 push，避免空提交报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update by GitHub Actions [skip ci]" && git push)
